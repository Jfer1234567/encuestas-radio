<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transmisión en Vivo - Radio Allincapac</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/dashboard.css}">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>

<div class="header-tv text-center">
    <h1 class="fw-bold mb-0 texto-brillante text-uppercase tracking-wider">RESULTADOS EN VIVO - RADIO ALLINCAPAC</h1>
</div>

<div class="container-fluid mt-5 px-5">

    <div th:if="${encuestas.isEmpty()}" class="text-center mt-5">
        <h2 class="text-muted">Esperando la próxima votación...</h2>
    </div>

    <div th:if="${!encuestas.isEmpty()}" class="row align-items-center">

        <div class="col-md-5 text-center">
            <div class="panel-principal mb-4">
                <h2 class="fw-bold mb-4" th:text="${encuestas[0].titulo}">Pregunta en Debate</h2>

                <div th:if="${!encuestas[0].activa}" class="alert alert-danger fw-bold fs-4 mb-4">
                    ⏹️ VOTACIÓN CERRADA
                </div>

                <div th:if="${encuestas[0].activa}" class="mb-4">
                    <div class="qr-caja shadow-lg">
                        <canvas id="qr-code"></canvas>
                    </div>
                    <h4 class="mt-3 text-warning fw-bold">¡Escanea para votar!</h4>
                </div>

                <hr class="border-secondary">
                <h5 class="text-secondary fw-bold text-uppercase mt-4">Votos Emitidos</h5>
                <div class="total-votos" id="totalVotosTV">0</div>
            </div>
        </div>

        <div class="col-md-7">
            <div class="panel-principal d-flex justify-content-center" style="height: 600px;">
                <canvas id="graficoTV"></canvas>
            </div>
        </div>

    </div>
</div>

<script th:inline="javascript">
    window.encuestasDataLocal = /*[[${encuestas}]]*/ [];
</script>

<script th:src="@{/js/dashboard.js}"></script>
</body>
</html>
