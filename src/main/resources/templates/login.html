<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Radio Allincapac</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
        font-family: 'Poppins', sans-serif;
        /* Velo oscuro al 50% sobre la imagen del venado */
        background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('/img/nevado.jpg');
        background-size: cover;
        background-position: center center;
        background-repeat: no-repeat;
        background-attachment: fixed;

        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        }
        .login-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
            background: white;
        }
        .login-header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 5px solid #ffc107;
        }
        .login-logo {
            max-height: 80px;
            margin-bottom: 15px;
        }
        .form-control {
            border-radius: 8px;
            padding: 12px 15px;
        }
        .btn-login {
            background-color: #0d6efd;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-login:hover {
            background-color: #0b5ed7;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(13, 110, 253, 0.3);
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-header">
        <img th:src="@{/img/logo_RVA1.jpg}" alt="Logo Radio Allincapac" class="login-logo">
        <h4 class="text-white fw-bold mb-0">Panel de Control</h4>
        <p class="text-white-50 small mb-0">Acceso exclusivo para producción</p>
    </div>

    <div class="card-body p-4 p-md-5">

        <div th:if="${param.error}" class="alert alert-danger text-center small fw-bold rounded-3">
            ❌ Usuario o contraseña incorrectos.
        </div>
        <div th:if="${param.logout}" class="alert alert-success text-center small fw-bold rounded-3">
            ✅ Sesión cerrada correctamente.
        </div>

        <form th:action="@{/login}" method="post">

            <div class="mb-4">
                <label class="form-label text-muted fw-bold small">USUARIO</label>
                <input type="text" name="username" class="form-control bg-light" placeholder="Ingresa tu usuario" required autofocus>
            </div>

            <div class="mb-4">
                <label class="form-label text-muted fw-bold small">CONTRASEÑA</label>
                <input type="password" name="password" class="form-control bg-light" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary btn-login w-100 text-white mt-2">
                Ingresar al Sistema
            </button>

        </form>
    </div>
</div>

</body>
</html>
